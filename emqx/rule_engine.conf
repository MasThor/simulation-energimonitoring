# ============================================================
# EMQX Rule Engine — Setup Guide
# ============================================================
# EMQX 5.x Rule Engine is configured via the Dashboard UI or
# REST API. This file documents the exact rule to create.
#
# After `docker compose up`, open:
#   http://localhost:18083
#   Login: admin / <EMQX_DASHBOARD_PASS from .env>
#
# Navigate to: Integration → Rules → Create Rule
# ============================================================

# ── Step 1: Create MQTT User ─────────────────────────────────
# Dashboard → Access Control → Authentication → Built-in Database
# Add user:
#   Username: iot_user
#   Password: <MQTT_PASS from .env>

# ── Step 2: Create InfluxDB v3 Connector ─────────────────────
# Dashboard → Integration → Connectors → Create
#   Type:     HTTP (since EMQX OSS uses HTTP for InfluxDB v3)
#   Name:     influxdb_v3_connector
#   Base URL: http://influxdb:8086
#   Headers:
#     Authorization: Token <INFLUX_TOKEN from .env>
#     Content-Type: text/plain; charset=utf-8

# ── Step 3: Create Action (HTTP Request) ─────────────────────
# Dashboard → Integration → Rules → Actions (after rule)
#   Method:  POST
#   Path:    /api/v3/write_lp?db=energy_monitoring&precision=ms
#   Body:    (see rule SQL output below)

# ── Step 4: Create Rule ──────────────────────────────────────
# Dashboard → Integration → Rules → Create
#   Name: energy_raw_to_influxdb
#
# SQL:
# ─────────────────────────────────────────────────────────────
rule_sql: |
  SELECT
    payload.machine_id    AS machine_id,
    payload.location      AS location,
    payload.power_kw      AS power_kw,
    payload.energy_kwh    AS energy_kwh,
    payload.voltage_v     AS voltage_v,
    payload.current_a     AS current_a,
    payload.power_factor  AS power_factor,
    payload.timestamp     AS ts_ms,
    timestamp             AS mqtt_ts
  FROM
    "factory/+/+/energy"
# ─────────────────────────────────────────────────────────────

# Action Body Template (InfluxDB Line Protocol):
# ─────────────────────────────────────────────────────────────
action_body: |
  energy_raw,machine_id=${machine_id},location=${location} power_kw=${power_kw},energy_kwh=${energy_kwh},voltage_v=${voltage_v},current_a=${current_a},power_factor=${power_factor} ${ts_ms}
# ─────────────────────────────────────────────────────────────
# Note: The trailing space + ${ts_ms} sets the timestamp in milliseconds.
# precision=ms must match in the POST URL above.

# ── Alternative: REST API setup (scripted) ───────────────────
# Run after EMQX is up:
#
#   BASE=http://localhost:18083/api/v5
#   AUTH="admin:<EMQX_DASHBOARD_PASS>"
#
#   # Create connector
#   curl -u $AUTH -X POST $BASE/connectors \
#     -H "Content-Type: application/json" \
#     -d '{
#       "type": "http",
#       "name": "influxdb_v3",
#       "url": "http://influxdb:8086",
#       "headers": {
#         "Authorization": "Token <INFLUX_TOKEN>",
#         "Content-Type": "text/plain; charset=utf-8"
#       }
#     }'
