  #   #   - ./influx-ui/config:/app-root/config:ro
  #   environment:
  #     - SESSION_SECRET_KEY=apiv3_9MlQmU6Dw_VeuV_twYxN7bEheUMZiNrDfn3_ZNhWKFo4Pb5FPFNZR7k19mekz7heT2m1P4l-fMpOI2kgoJ27NA
  #   command: [ "--mode=admin" ]
  #   depends_on:
  #     influxdb:
