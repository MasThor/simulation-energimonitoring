  #     driver: json-file
  #     options:
  #       max-size: "100m"
  #       max-file: "5"
  influxdb-ui:
    image: influxdata/influxdb3-ui:1.8.0
    container_name: influxdb3-explorer
    pull_policy: always
    command: [ "--mode=admin" ]
    ports:
      - "8888:8080"
    volumes:
      - ./influx-ui/config:/app-root/config
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # ----------------------------------------------------------
  # Node-RED — Data Collector (SCADA/Modbus → MQTT Publisher)
  # Role: Read from machines, publish JSON to EMQX
  # UI: http://localhost:1880
  # ----------------------------------------------------------
  nodered:
    image: nodered/node-red:latest
    container_name: nodered
    ports:
      - '${NODE_RED_PORT:-1880}:1880'
    volumes:
      # - nodered_data:/data
      - ./nodered/:/data/
    environment:
      - TZ=Asia/Jakarta
    depends_on:
      emqx:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
