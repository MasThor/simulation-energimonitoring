version: '3.8'

# ============================================================
# Manufacturing Energy Monitoring Stack
# Services: Redis · EMQX · InfluxDB v3 · Node-RED · Aggregator
# ============================================================

volumes:
  emqx_data:
  emqx_log:
  influxdb_data:
  nodered_data:

services:

  # ----------------------------------------------------------
  # Redis 7 — State & Checkpoint Storage
  # Role: Store last-aggregation timestamps (idempotent jobs)
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - '${REDIS_PORT:-6379}:6379'
    restart: unless-stopped
    command: >
      redis-server --save "" --appendonly no --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-redispass}
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispass}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ----------------------------------------------------------
  # EMQX 5.x OSS — MQTT Broker + Rule Engine
  # Role: Receive MQTT from Node-RED, forward raw to InfluxDB
  # Dashboard: http://localhost:18083  (admin / see .env)
  # ----------------------------------------------------------
  emqx:
    image: emqx:5.7.0
    container_name: emqx
    ports:
      - '${EMQX_MQTT_PORT:-1883}:1883' # MQTT
      - '${EMQX_DASHBOARD_PORT:-18083}:18083' # Web Dashboard
    environment:
      # Bootstrap admin user for dashboard
      - EMQX_DASHBOARD__DEFAULT_USERNAME=${EMQX_DASHBOARD_USER:-admin}
      - EMQX_DASHBOARD__DEFAULT_PASSWORD=${EMQX_DASHBOARD_PASS:-public}
      # Allow anonymous publish for dev; set to false in prod
      - EMQX_ALLOW_ANONYMOUS=true
    volumes:
      - emqx_data:/opt/emqx/data
      - emqx_log:/opt/emqx/log
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "/opt/emqx/bin/emqx", "ctl", "status" ]
      interval: 15s
      timeout: 10s
      retries: 10
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ----------------------------------------------------------
  # InfluxDB v3 Core — Time-Series Database
  # Role: Primary store for raw, minute, and hour energy data
  # UI: http://localhost:8086
  # ----------------------------------------------------------
  influxdb:
    image: influxdb:3.10-core
    container_name: influxdb

    ports:
      - "8086:8181"

    environment:
      INFLUXDB3_NODE_IDENTIFIER_PREFIX: local

    volumes:
      - influxdb_data:/var/lib/influxdb3
      - ./influxdb/plugins:/var/lib/influxdb3/plugins

    restart: unless-stopped

    healthcheck:
      test: [ "CMD-SHELL", "wget -q --spider http://localhost:8181/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  # ----------------------------------------------------------
  # InfluxDB UI — stand-alone Explorer UI for InfluxDB v3 Core
  # Role: Visualization and query console for InfluxDB v3 Core
  # UI: http://localhost:8055
  # ----------------------------------------------------------
  # influxdb-ui:
