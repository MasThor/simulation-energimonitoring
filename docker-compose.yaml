  #   command: [ "--mode=admin" ]
  #   restart: unless-stopped

  # influxdb-ui:
  #   image: influxdata/influxdb3-ui:1.9.0
  #   container_name: influxdb_ui
  #   ports:
  #     # UBAH: Port disamakan dengan komentar agar bisa diakses di localhost:8055
  #     - "8055:80"
  #   # UBAH: Dimatikan sementara agar tidak crash jika folder ./influx-ui/config belum ada
